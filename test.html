<!DOCTYPE html>

    <meta charset="UTF-8">

<body style="background-image: url(bg3.png); background-attachment:fixed; background-size:cover;">
    <div class="desklogobar">
        <a href="index.html">
            <img src="orblogo.png" alt="smalllogo" class="logo">
            Cerulean
        </a>
        <div class="dropdown">
			<button onclick="myFunction()" class="dropbtn"><img id="git" src="github-mark.png" alt="hjbdgshfjgfdhjdsbgf"></button>
            <div id="myDropdown" class="dropdown-content">
              <a href="#home">Home</a>
              <a href="#about">About</a>
              <a href="#contact">Contact</a>
            </div>
          </div>
          <script>
            /* When the user clicks on the button, 
            toggle between hiding and showing the dropdown content */
            function myFunction() {
              document.getElementById("myDropdown").classList.toggle("show");
            }
            
            // Close the dropdown if the user clicks outside of it
            window.onclick = function(event) {
              if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                var i;
                for (i = 0; i < dropdowns.length; i++) {
                  var openDropdown = dropdowns[i];
                  if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                  }
                }
              }
            }
            </script>
            
    </div>
    <header>
        <div class="desklargelogo">
            <img src="orblogo.png" alt="largelogo" class="largelogo">
            <h3>Cerulean</h3>
        </div>
    </header>
