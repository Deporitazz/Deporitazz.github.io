<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon (1).ico">
    <title>Cerulean | Home</title>
    <link rel="stylesheet" href="test.css">
</head>
<style>
    .dropbtn {
      background-color: #04AA6D;
      color: white;
      padding: 16px;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }
    
    .dropbtn:hover, .dropbtn:focus {
      background-color: #3e8e41;
    }
    
    .dropdown {
      float: right; 
      position: relative;
      display: flex;
    }
    
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f1f1f1;
      min-width: 160px;
      overflow: auto;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      right: 0;
      z-index: 1;
    }
    
    .dropdown-content a {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
    }
    
    .dropdown a:hover {background-color: #ddd;}
    
    .show {display: block;}
    </style>
<body style="background-image: url(bg3.png); background-attachment:fixed; background-size:cover;">
    <div class="desklogobar">
        <a href="index.html">
            <img src="orblogo.png" alt="smalllogo" class="logo">
            Cerulean
        </a>
        <div class="dropdown">
            <button onclick="myFunction()" class="dropbtn">Dropdown</button>
            <div id="myDropdown" class="dropdown-content">
              <a href="#home">Home</a>
              <a href="#about">About</a>
              <a href="#contact">Contact</a>
            </div>
          </div>
          <script>
            /* When the user clicks on the button, 
            toggle between hiding and showing the dropdown content */
            function myFunction() {
              document.getElementById("myDropdown").classList.toggle("show");
            }
            
            // Close the dropdown if the user clicks outside of it
            window.onclick = function(event) {
              if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                var i;
                for (i = 0; i < dropdowns.length; i++) {
                  var openDropdown = dropdowns[i];
                  if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                  }
                }
              }
            }
            </script>
            
    </div>
    <header>
        <div class="desklargelogo">
            <img src="orblogo.png" alt="largelogo" class="largelogo">
            <h3>Cerulean</h3>
        </div>
    </header>
    <nav class="desknav">
        <ul class="navbutton">
            <li>
                <a href="index.html">
                    Home
                </a>
            </li>
        </ul>
        <ul class="navbutton">
            <a href="page-2.html">
                Page 2
            </a>
        </ul>
        <ul class="navbutton">
            <a href="old-page.html">
                Old Page
            </a>
        </ul>
        <ul class="navbutton">
            <a href="https://github.com/Deporitazz">
                Projects
            </a>
        </ul>
    </nav>
</body>
</html>
